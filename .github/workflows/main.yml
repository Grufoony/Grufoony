name: generate profile assets

on:
  # run automatically everyday at 3:00 am (UTC)
  schedule:
    - cron: "0 3 * * *"

  # allows to manually run the job at any time
  workflow_dispatch:

  # run on every push on the main branch
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Snake animation ──────────────────────────────────────────
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3.3.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Readme Stats (self-hosted) ────────────────────────
      - name: Checkout github-readme-stats
        uses: actions/checkout@v4
        with:
          repository: anuraghazra/github-readme-stats
          path: github-readme-stats

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install github-readme-stats dependencies
        run: cd github-readme-stats && npm install

      - name: Generate stats cards
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd github-readme-stats
          node express.js &
          SERVER_PID=$!

          # Wait for the server to be ready (up to 30 s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000 > /dev/null 2>&1 && break
            sleep 1
          done

          BASE="http://localhost:9000"
          OUT="../dist"
          mkdir -p "$OUT"

          # ── Stats card ──
          curl -s "$BASE/api?username=Grufoony&show_icons=true&theme=dark" -o "$OUT/stats-dark.svg"
          curl -s "$BASE/api?username=Grufoony&show_icons=true&theme=default" -o "$OUT/stats-light.svg"

          # ── Top languages ──
          curl -s "$BASE/api/top-langs/?username=Grufoony&hide=TeX%2CCSS%2Cjupyter%20notebook&layout=compact&theme=dark" -o "$OUT/top-langs-dark.svg"
          curl -s "$BASE/api/top-langs/?username=Grufoony&hide=TeX%2CCSS%2Cjupyter%20notebook&layout=compact&theme=default" -o "$OUT/top-langs-light.svg"

          # ── Pin cards (Grufoony repos) ──
          for repo in OpenSwim ytd GOandUISP Open_Physics; do
            curl -s "$BASE/api/pin/?username=Grufoony&repo=$repo&title_color=fff&icon_color=79ff97&text_color=9f9f9f&bg_color=151515" -o "$OUT/pin-$repo-dark.svg"
            curl -s "$BASE/api/pin/?username=Grufoony&repo=$repo&theme=default" -o "$OUT/pin-$repo-light.svg"
          done

          # ── Pin card (physycom org) ──
          curl -s "$BASE/api/pin/?username=physycom&repo=DynamicalSystemFramework&title_color=fff&icon_color=79ff97&text_color=9f9f9f&bg_color=151515" -o "$OUT/pin-DynamicalSystemFramework-dark.svg"
          curl -s "$BASE/api/pin/?username=physycom&repo=DynamicalSystemFramework&theme=default" -o "$OUT/pin-DynamicalSystemFramework-light.svg"

          kill $SERVER_PID

      # ── Push all assets to the output branch ─────────────────────
      # Available at https://raw.githubusercontent.com/<user>/<repo>/output/<file>
      - name: push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
